<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#02050c" />
<title>MyCar Console</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icons/icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="scan"></div>
<div class="app">
  <div class="topbar">
    <div class="logo glitch" id="appName" data-t="MYCAR·CONSOLE">MYCAR·CONSOLE</div>
    <div class="spacer"></div>
    <div class="live"><span class="dot"></span>SYNCED</div>
    <button class="gear" data-screen="settings" aria-label="設定">⚙️</button>
  </div>

  <div class="vehicle panel" id="vehicleBar"></div>

  <main id="screen"></main>
</div>

<nav class="nav">
  <button data-screen="dashboard" class="active"><span class="i">📊</span>Dash</button>
  <button data-screen="history"><span class="i">📋</span>履歴</button>
  <button class="fab" id="fab">＋</button>
  <button data-screen="refuel"><span class="i">⛽</span>給油</button>
  <button data-screen="cost"><span class="i">💴</span>維持費</button>
</nav>

<div class="modal-wrap" id="modalWrap">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal">
    <div class="modal-head"><h3 id="modalTitle"></h3><button id="modalClose">×</button></div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ログイン画面（未サインイン時に表示） -->
<div class="login-screen" id="loginScreen" hidden>
  <div class="login-card">
    <div class="login-logo">MY<span>CAR</span>·CONSOLE</div>
    <div class="login-sub">マイカー メンテナンス管理</div>
    <div class="login-icon"><img src="icons/car.svg" alt="car" /></div>
    <p class="login-msg">続けるには Google でログインしてください。<br>登録されたメンバーのみ利用できます。</p>
    <div class="login-btn" id="gbtn"></div>
    <div class="login-note" id="loginNote"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/mock.js"></script>
<script src="js/render.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/export.js"></script>
<script src="js/notify.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }
</script>
</body>
</html>
