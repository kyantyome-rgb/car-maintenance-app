    <path d="M150 360 A150 150 0 1 1 362 360" stroke="#13314d"/>
    <path d="M150 360 A150 150 0 0 1 256 106" stroke="url(#g)" style="filter:drop-shadow(0 0 10px #5eecff)"/>
  </g>
  <!-- needle -->
  <g stroke="#ff5cf3" stroke-width="10" stroke-linecap="round" style="filter:drop-shadow(0 0 8px #ff5cf3)">
    <line x1="256" y1="256" x2="320" y2="190"/>
  </g>
  <circle cx="256" cy="256" r="20" fill="#5eecff"/>
  <text x="256" y="430" font-family="Orbitron, sans-serif" font-size="62" font-weight="900" fill="#5eecff" text-anchor="middle">MC</text>
</svg>
