<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eecff"/>
      <stop offset="1" stop-color="#ff5cf3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="#04070f"/>
  <rect width="512" height="512" fill="#0a1830" opacity="0.6"/>
  <!-- tachometer arc -->
